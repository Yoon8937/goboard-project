name: 01 Docker Multi Build without Buildkit-cache-dance


on:
#  workflow_dispatch:
  push:
    branches: ["main", "experiment/buildkit-cache-off"]
  pull_request:
    branches: ["main"]


jobs:
  build-and-test:
    runs-on: ubuntu-latest


    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4


    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3


    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: "1.26"


    - name: dependencies build cache
      uses: actions/cache@v4
      with:
        #path: go-build-cache
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: ${{ runner.os }}-go-build-cache-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-build-cache-


    - name: Download dependencies
      run: go mod download


    - name: Build
      run: |
        mkdir -p dist
        go build \
        -ldflags="-w -s" \
        -o dist/server \
        ./cmd/server


    - name: Build Dcoker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.test
        push: false
        tags: goboard:latest
        cache-from: type=gha
        cache-to: type=gha, mode=max

